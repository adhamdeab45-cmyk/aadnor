:root{--bg:#020711;--bg2:#071a33;--card:rgba(255,255,255,.09);--card2:rgba(255,255,255,.14);--line:rgba(255,255,255,.18);--gold:#ffd56a;--gold2:#d4af37;--txt:#f7f7fb;--muted:#b8c2d6;--green:#18f29b;--red:#ff5c6c;--blue:#13c8ff;--shadow:0 18px 60px rgba(0,0,0,.35)}
*{box-sizing:border-box}body{margin:0;font-family:'IBM Plex Sans Arabic',system-ui;background:radial-gradient(circle at 20% 10%,rgba(255,213,106,.20),transparent 32%),radial-gradient(circle at 75% 0,rgba(19,200,255,.18),transparent 35%),linear-gradient(135deg,#020711,#071a33 55%,#120f22);color:var(--txt);min-height:100vh}.hidden{display:none!important}.app{max-width:1280px;margin:auto;padding:18px 14px 92px}.glass{background:linear-gradient(180deg,rgba(255,255,255,.13),rgba(255,255,255,.06));border:1px solid var(--line);box-shadow:var(--shadow);backdrop-filter:blur(14px);border-radius:26px}.top{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 16px;margin-bottom:14px}.brand{display:flex;gap:12px;align-items:center}.logo{width:54px;height:54px;border-radius:18px;background:linear-gradient(135deg,var(--gold),#fff2b0);color:#151515;display:grid;place-items:center;font-weight:900;box-shadow:0 0 34px rgba(255,213,106,.35)}h1,h2,h3,p{margin:0}.muted{color:var(--muted)}.pill{display:inline-flex;align-items:center;gap:7px;padding:8px 12px;border-radius:999px;border:1px solid rgba(255,213,106,.35);background:rgba(255,213,106,.12);color:#fff1c6;font-weight:800}.grid{display:grid;gap:14px}.g2{grid-template-columns:repeat(2,minmax(0,1fr))}.g3{grid-template-columns:repeat(3,minmax(0,1fr))}.g4{grid-template-columns:repeat(4,minmax(0,1fr))}.card{padding:18px}.stat{padding:18px;min-height:120px}.stat b{font-size:30px;color:var(--gold);display:block;margin-top:8px}.btn{border:none;border-radius:17px;padding:13px 16px;background:linear-gradient(135deg,var(--gold),#fff3b5);color:#1b1504;font-weight:900;cursor:pointer;box-shadow:0 10px 28px rgba(255,213,106,.18);font-family:inherit}.btn:hover{transform:translateY(-1px)}.btn.secondary{background:rgba(255,255,255,.1);color:var(--txt);border:1px solid var(--line);box-shadow:none}.btn.red{background:linear-gradient(135deg,#ff5c6c,#ff9aa5);color:#230307}.btn.green{background:linear-gradient(135deg,#18f29b,# verflow:auto;font-family:monospace;text-align:left;direction:ltr;font-size:12px}.sep{height:1px;background:rgba(255,255,255,.12);margin:14px 0}.wheel{width:270px;height:270px;border-radius:50%;margin:auto;position:relative;background:conic-gradient(#ffd56a 0 30deg,#14294b 30deg 60deg,#13c8ff 60deg 90deg,#1f355e 90deg 120deg,#ff5c6c 120deg 150deg,#0a213f 150deg 180deg,#d4af37 180deg 210deg,#18f29b 210deg 240deg,#223c66 240deg 270deg,#fff2b0 270deg 300deg,#622 300deg 330deg,#123 330deg 360deg);border:8px solid rgba(255,213,106,.6);box-shadow:0 0 70px rgba(255,213,106,.22);transition:transform 4s cubic-bezier(.12,.77,.1,1)}.wheel:before{content:'▼';position:absolute;top:-35px;left:50%;transform:translateX(-50%);font-size:38px;color:var(--gold)}.wheel:after{content:'AD';position:absolute;inset:82px;border-radius:50%;background:linear-gradient(135deg,#fff2b0,#d4af37);color:#111;display:grid;place-items:center;font-weight:900;font-size:32px}.toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:1000;padding:13px 18px;border-radius:16px;background:#111827;border:1px solid rgba(255,255,255,.18);box-shadow:var(--shadow);font-weight:900}.splash{position:fixed;inset:0;background:radial-gradient(circle at center,rgba(255,213,106,.25),transparent 38%),linear-gradient(135deg,#020711,#071a33);z-index:999;display:grid;place-items:center;text-align:center}.splash.hide{opacity:0;pointer-events:none;transition:.5s}.badge{padding:5px 8px;border-radius:10px;background:rgba(255,255,255,.10);font-size:12px}.dangerNote{border:1px solid rgba(255,92,108,.35);background:rgba(255,92,108,.10);color:#ffd0d5;border-radius:16px;padding:12px}.goodNote{border:1px solid rgba(24,242,155,.35);background:rgba(24,242,155,.10);color:#d9fff0;border-radius:16px;padding:12px}@media(max-width:850px){.g2,.g3,.g4{grid-template-columns:1fr}.top{align-items:flex-start}.hideMobile{display:none}.stat b{font-size:24px}.nav{grid-template-columns:repeat(5,1fr);font-size:12px}.app{padding-bottom:100px}.table{font-size:12px;display:block;overflow:auto}.row .btn{flex:1}.wheel{width:230px;height:230px}.wheel:after{inset:70px}}

<script>
const firebaseConfig={apiKey:"AIzaSyC3QDYwjgPWHkd8hM9l1RNpUIzdywOwv1g",authDomain:"adhamnnn-8a4d2.firebaseapp.com",databaseURL:"https://adhamnnn-8a4d2-default-rtdb.firebaseio.com",projectId:"adhamnnn-8a4d2",storageBucket:"adhamnnn-8a4d2.firebasestorage.app",messagingSenderId:"812431761704",appId:"1:812431761704:web:2b85a0532574cc4378301d",measurementId:"G-59WKJBRDG8"};
firebase.initializeApp(firebaseConfig);const auth=firebase.auth(),db=firebase.database(),storage=firebase.storage();const ADMIN_EMAIL='adhamdeab2@gmail.com';
let currentUser=null, profile=null, isAdmin=false, page='home', adminMode=false, hideBal=false, unsub=[];const $=s=>document.querySelector(s);const money=n=>(Number(n||0)).toFixed(2);const now=()=>Date.now();function log(m){console.log('[ADNOR V15]',m); const el=$('#loginLog'); if(el) el.innerHTML+='['+new Date().toLocaleTimeString()+'] '+m+'<br>'}function toast(m){const t=$('#toast');t.textContent=m;t.classList.remove('hidden');setTimeout(()=>t.classList.add('hidden'),2500)}function esc(s){return String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}function code(){return Math.random().toString(36).slice(2,8).toUpperCase()}function byId(id){return document.getElementById(id)}
setTimeout(()=>$('#splash').classList.add('hide'),1200);
async function signInGoogle(){if(!$('#ageOk').checked)return toast('لازم توافق على الشروط');try{log('Google popup...');const p=new firebase.auth.GoogleAuthProvider();p.setCustomParameters({prompt:'select_account'});await auth.signInWithPopup(p)}catch(e){log('Google error: '+e.code+' '+e.message);toast(e.code||'فشل الدخول')}}
async function signInApple(){try{const provider=new firebase.auth.OAuthProvider('apple.com');provider.addScope('email');provider.addScope('name');await auth.signInWithPopup(provider)}catch(e){toast('Apple يحتاج إعدادات Apple Developer: '+(e.code||''));log('Apple error '+e.message)}}
$('#googleBtn').onclick=signInGoogle;$('#appleBtn').onclick=signInApple;$('#logoutBtn').onclick=()=>auth.signOut();$('#toggleBalance').onclick=()=>{hideBal=!hideBal;renderTop()};$('#adminToggle').onclick=()=>{if(!isAdmin)return toast('هذه الصفحة للأدمن فقط');adminMode=!adminMode;page=adminMode?'adminDash':'home';render()};
document.querySelectorAll('#nav button').forEach(b=>b.onclick=()=>{adminMode=false;page=b.dataset.page;render()});
auth.onAuthStateChanged(async u=>{currentUser=u;unsub.forEach(f=>f&&f());unsub=[];if(!u){$('#login').classList.remove('hidden');$('#app').classList.add('hidden');profile=null;return}$('#login').classList.add('hidden');$('#app').classList.remove('hidden');await ensureDefaults();await ensureProfile();listenProfile();render()});
async function ensureDefaults(){try{if(currentUser.email===ADMIN_EMAIL){await db.ref('admins/'+currentUser.uid).set(true);await db.ref('admin_emails/'+btoa(ADMIN_EMAIL).replaceAll('=','')).set(ADMIN_EMAIL)}const snap=await db.ref('global_system/settings').once('value');if(!snap.exists()&&currentUser.email===ADMIN_EMAIL){await db.ref('global_system').update({settings:{depositBonusPct:90,signupBonus:0.5,refNewBonus:0.5,refOwnerBonus:0.25,withdrawFeePct:0,referralsEnabled:true,lotteryTicketPrice:1},lucky_box:{enabled:true,min:0.10,max:1,winRate:35,cooldownHours:24,rewardType:'bonus'},wheel:{enabled:true,minBet:1,maxBet:500,segments:[{label:'0x',m:0,w:24},{label:'1x',m:1,w:28},{label:'2x',m:2,w:16},{label:'0x',m:0,w:24},{label:'100x',m:100,w:1},{label:'1x',m:1,w:28},{label:'10000x',m:10000,w:0.01},{label:'2x',m:2,w:16},{label:'0.5x',m:.5,w:18},{label:'5x',m:5,w:5},{label:'10x',m:10,w:2},{label:'0x',m:0,w:24}]}});await db.ref('payment_methods').set({usdt:{name:'USDT TRC20',type:'both',minDeposit:5,details:'أضف عنوان المحفظة من الأدمن',active:true},sham:{name:'Sham Cash',type:'both',minDeposit:100,details:'أضف رقم شام كاش من الأدمن',active:true},bank:{name:'Bank / IBAN',type:'both',minDeposit:10,details:'أضف IBAN من الأدمن',active:false},whatsapp:{name:'WhatsApp',type:'both',minDeposit:1,details:'أضف رقم واتساب من الأدمن',active:true},telegram:{name:'Telegram',type:'both',minDeposit:1,details:'أضف حساب تيليجرام من الأدمن',active:true}});await db.ref('draws/settings').set({daily:{name:'السحب اليومي',prize:4500,time:'20:00',active:true,next:'weekly'},weekly:{name:'السحب الأسبوعي',prize:15000,time:'20:00',active:true,next:'monthly'},monthly:{name:'السحب الشهري',prize:50000,time:'20:00',active:true,next:'yearly'},yearly:{name:'السحب السنوي',prize:250000,time:'20:00',active:true,next:null}});await db.ref('public_config/splash').set({enabled:true,title:'ADNOR',text:'النظام الملكي الكامل',duration:3});await db.ref('legal/terms').set('ADNOR منصة تجريبية. أي استخدام مالي حقيقي يحتاج ترخيص قانوني رسمي. البونص للعب فقط وغير قابل للسحب المباشر.')}}catch(e){console.warn(e)}}
async function ensureProfile(){const u=currentUser;const ref=db.ref('users/'+u.uid);const s=await ref.once('value');const admin=(u.email||'').toLowerCase()===ADMIN_EMAIL.toLowerCase();if(!s.exists()){const refFrom=new URLSearchParams(location.search).get('ref')||'';await ref.set({uid:u.uid,name:u.displayName||'مستخدم',email:u.email||'',phone:u.phoneNumber||'',photoURL:u.photoURL||'',role:admin?'admin':'user',isAdmin:admin,isVIP:false,isFrozen:false,realBalance:0,bonusBalance:0,reservedWithdrawalBalance:0,ticketsCount:0,refCode:code(),referredBy:refFrom,createdAt:now(),lastLogin:now(),lastLuckyAt:0,status:'active'});const gs=(await db.ref('global_system/settings').once('value')).val()||{};if(Number(gs.signupBonus)>0){await adjustBalance(u.uid,0,Number(gs.signupBonus),0,'signup_bonus','بونص تسجيل')}}else{await ref.update({lastLogin:now(),isAdmin:admin,role:admin?'admin':(s.val().role||'user')})}await db.ref('login_logs/'+u.uid).push({email:u.email,at:now(),ua:navigator.userAgent});if(admin)await db.ref('admins/'+u.uid).set(true)}
function listenProfile(){const r=db.ref('users/'+currentUser.uid);r.on('value',s=>{profile=s.val();isAdmin=!!(profile&&profile.isAdmin)||currentUser.email===ADMIN_EMAIL;renderTop();render()});unsub.push(()=>r.off())}
function renderTop(){if(!profile)return;$('#userLine').textContent=(profile.name||'')+' | '+(profile.email||'');$('#topBalance').textContent=hideBal?'••••':money(profile.realBalance);}
async function adjustBalance(uid,real=0,bonus=0,reserved=0,type='manual',note=''){const ref=db.ref('users/'+uid);const s=await ref.once('value');const u=s.val()||{};await ref.update({realBalance:Number(u.realBalance||0)+Number(real||0),bonusBalance:Number(u.bonusBalance||0)+Number(bonus||0),reservedWithdrawalBalance:Number(u.reservedWithdrawalBalance||0)+Number(reserved||0)});await db.ref('transactions/'+uid).push({type,note,real,bonus,reserved,createdAt:now(),by:currentUser?.email||'system'});await db.ref('audit_logs').push({uid,type,note,real,bonus,reserved,createdAt:now(),by:currentUser?.email||'system'})}
function render(){if(!profile)return;if(adminMode||page.startsWith('admin'))return renderAdmin();document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('active',b.dataset.page===page));const map={home:homeView,wallet:walletView,lottery:lotteryView,games:gamesView,support:supportView};$('#view').innerHTML=(map[page]||homeView)();afterRender()}
function afterRender(){if(page==='wallet')loadWalletData();if(page==='lottery')loadLotteryData();if(page==='games')loadGameData();if(page==='support')loadSupportData();if(adminMode||page.startsWith('admin'))loadAdminData()}
function homeView(){return `<section class="grid g3"><div class="glass stat"><p>الرصيد الحقيقي</p><b>${money(profile.realBalance)}$</b></div><div class="glass stat"><p>البونص</p><b>${money(profile.bonusBalance)}$</b></div><div class="glass stat"><p>المحجوز للسحب</p><b>${money(profile.reservedWithdrawalBalance)}$</b></div></section><section class="grid g2" style="margin-top:14px"><div class="glass card"><h2>اليانصيب الملكي</h2><p class="muted">تذكرة 1$ تدخل اليومي ثم الأسبوعي ثم الشهري ثم السنوي إذا لم تربح.</p><button class="btn" onclick="page='lottery';render()">شراء تذكرة</button></div><div class="glass card"><h2>الدعوات</h2><p class="muted">كودك: <b>${esc(profile.refCode)}</b></p><input class="field" readonly value="${location.origin+location.pathname+'?ref='+esc(profile.refCode)}"><button class="btn secondary" onclick="navigator.clipboard.writeText('${location.origin+location.pathname+'?ref='+esc(profile.refCode)}');toast('تم النسخ')">نسخ الرابط</button></div></section><section class="glass card" style="margin-top:14px"><h2>حالة النظام</h2><div class="goodNote">Google + Firebase + Realtime Database شغالين. النسخة الحالية V15 فيها المحفظة، الإيداع، السحب، اليانصيب، العجلة، الدعم، والإدارة.</div></section>`}
function walletView(){return `<section class="grid g3"><div class="glass stat"><p>الرصيد الحقيقي</p><b>${money(profile.realBalance)}$</b></div><div class="glass stat"><p>البونص</p><b>${money(profile.bonusBalance)}$</b></div><div class="glass stat"><p>محجوز للسحب</p><b>${money(profile.reservedWithdrawalBalance)}$</b></div></section><section class="grid g2" style="margin-top:14px"><div class="glass card"><h2>طلب إيداع</h2><label>المبلغ USD</label><input id="depAmount" class="field" type="number" min="1" value="10"><label>طريقة الدفع</label><select id="depMethod" class="field"></select><label>إيصال الدفع / صورة</label><input id="depFile" class="field" type="file" accept="image/*"><label>ملاحظة</label><textarea id="depNote" class="field" placeholder="رقم العملية أو ملاحظة"></textarea><button class="btn" onclick="submitDeposit()">إرسال طلب إيداع</button><div id="methodsBox" class="muted"></div></div><div class="glass card"><h2>طلب سحب</h2><label>المبلغ USD</label><input id="wdAmount" class="field" type="number" min="1" value="5"><label>طريقة السحب</label><select id="wdMethod" class="field"></select><label>بيانات حسابك</label><textarea id="wdDetails" class="field" placeholder="عنوان USDT أو رقم الحساب"></textarea><button class="btn red" onclick="submitWithdraw()">إرسال طلب سحب</button><div class="dangerNote" style="margin-top:10px">عند طلب السحب ينخصم المبلغ فورًا وينتقل إلى الرصيد المحجوز حتى موافقة الأدمن.</div></div></section><section class="glass card" style="margin-top:14px"><h2>سجل العمليات</h2><div id="txBox"></div></section>`}
async function loadWalletData(){const ms=(await db.ref('payment_methods').once('value')).val()||{};let opts='';let details='';Object.entries(ms).forEach(([id,m])=>{if(m.active){opts+=`<option value="${id}">${esc(m.name)}</option>`;details+=`<div class="badge" style="margin:5px;display:inline-block">${esc(m.name)} | حد أدنى: ${esc(m.minDeposit||0)} | ${esc(m.details||'')}</div>`}});['depMethod','wdMethod'].forEach(id=>{if(byId(id))byId(id).innerHTML=opts});if(byId('methodsBox'))byId('methodsBox').innerHTML=details;const tx=(await db.ref('transactions/'+currentUser.uid).limitToLast(20).once('value')).val()||{};$('#txBox').innerHTML=table(Object.values(tx).reverse(),['type','note','real','bonus','reserved','createdAt'])}
async function uploadReceipt(file){if(!file)return '';try{const path='receipts/'+currentUser.uid+'/'+Date.now()+'_'+file.name.replace(/[^a-zA-Z0-9_.-]/g,'_');const snap=await storage.ref(path).put(file);return await snap.ref.getDownloadURL()}catch(e){toast('فشل رفع الصورة، سيتم إرسال الطلب بدون صورة');console.warn(e);return ''}}
async function submitDeposit(){const amount=Number($('#depAmount').value||0);if(amount<=0)return toast('اكتب مبلغ صحيح');const method=$('#depMethod').value;const receiptUrl=await uploadReceipt($('#depFile').files[0]);await db.ref('finance/deposits').push({uid:currentUser.uid,name:profile.name,email:profile.email,amount,method,receiptUrl,note:$('#depNote').value,status:'pending',createdAt:now()});await db.ref('admin_notifications').push({type:'deposit',title:'طلب إيداع جديد',amount,uid:currentUser.uid,createdAt:now(),read:false});toast('تم إرسال طلب الإيداع')}
async function submitWithdraw(){const amount=Number($('#wdAmount').value||0);if(amount<=0)return toast('اكتب مبلغ صحيح');if(Number(profile.realBalance)<amount)return toast('الرصيد غير كافي');const method=$('#wdMethod').value,details=$('#wdDetails').value;await adjustBalance(currentUser.uid,-amount,0,amount,'withdraw_request','طلب سحب');await db.ref('finance/withdrawals').push({uid:currentUser.uid,name:profile.name,email:profile.email,amount,method,details,status:'pending',createdAt:now()});await db.ref('admin_notifications').push({type:'withdrawal',title:'طلب سحب جديد',amount,uid:currentUser.uid,createdAt:now(),read:false});toast('تم إرسال طلب السحب')}
function lotteryView(){return `<section class="glass card"><h2>اليانصيب</h2><p class="muted">اختر نوع السحب واشترِ تذكرة. السعر الافتراضي 1$.</p><div class="tabs" id="drawTabs"></div><div id="drawInfo"></div><div class="grid g2" style="margin-top:14px"><div><label>رقم التذكرة</label><input id="ticketNumber" class="field" placeholder="مثال 0001234"><div class="row"><button class="btn secondary" onclick="byId('ticketNumber').value=String(Math.floor(Math.random()*10000000)).padStart(7,'0')">رقم عشوائي</button><button class="btn" onclick="buyTicket()">شراء تذكرة</button></div></div><div class="goodNote">كل عملية شراء تنحفظ في Firebase وتخصم من الرصيد الحقيقي.</div></div></section><section class="glass card" style="margin-top:14px"><h2>تذاكري</h2><div id="myTickets"></div></section>`}
let currentDraw='daily';async function loadLotteryData(){const settings=(await db.ref('draws/settings').once('value')).val()||{};$('#drawTabs').innerHTML=Object.keys(settings).map(k=>`<span class="tab ${k===currentDraw?'active':''}" onclick="currentDraw='${k}';loadLotteryData()">${esc(settings[k].name)}</span>`).join('');const d=settings[currentDraw]||{};$('#drawInfo').innerHTML=`<div class="grid g3"><div class="glass stat"><p>الجائزة</p><b>${money(d.prize)}$</b></div><div class="glass stat"><p>الوقت</p><b>${esc(d.time||'20:00')}</b></div><div class="glass stat"><p>الحالة</p><b>${d.active?'مفعّل':'متوقف'}</b></div></div>`;const t=(await db.ref('tickets').orderByChild('uid').equalTo(currentUser.uid).limitToLast(30).once('value')).val()||{};$('#myTickets').innerHTML=table(Object.values(t).reverse(),['number','drawType','price','status','createdAt'])}
async function buyTicket(){const n=$('#ticketNumber').value.trim()||String(Math.floor(Math.random()*10000000)).padStart(7,'0');const gs=(await db.ref('global_system/settings').once('value')).val()||{};const price=Number(gs.lotteryTicketPrice||1);if(Number(profile.realBalance)<price)return toast('الرصيد غير كافي');await adjustBalance(currentUser.uid,-price,0,0,'ticket_buy','شراء تذكرة '+n);await db.ref('tickets').push({uid:currentUser.uid,name:profile.name,email:profile.email,number:n,drawType:currentDraw,price,status:'active',createdAt:now(),won:false});await db.ref('users/'+currentUser.uid+'/ticketsCount').set(Number(profile.ticketsCount||0)+1);toast('تم شراء التذكرة');loadLotteryData()}
function gamesView(){return `<section class="grid g2"><div class="glass card"><h2>عجلة الحظ الملكية</h2><div id="wheel" class="wheel"></div><label>قيمة الرهان</label><input id="wheelBet" class="field" type="number" value="1"><button class="btn" onclick="spinWheel()">دور العجلة</button><p id="wheelResult" class="muted"></p></div><div class="glass card"><h2>صندوق الحظ اليومي</h2><p class="muted">افتح الصندوق مرة كل 24 ساعة.</p><button class="btn green" onclick="openLuckyBox()">فتح الصندوق</button><div id="luckyResult" class="goodNote" style="margin-top:12px"></div></div></section><section class="glass card" style="margin-top:14px"><h2>سجل العجلة</h2><div id="wheelLogs"></div></section>`}
async function loadGameData(){const logs=(await db.ref('wheel_logs').orderByChild('uid').equalTo(currentUser.uid).limitToLast(20).once('value')).val()||{};$('#wheelLogs').innerHTML=table(Object.values(logs).reverse(),['bet','label','multiplier','profit','createdAt'])}
async function spinWheel(){const set=(await db.ref('global_system/wheel').once('value')).val()||{};if(!set.enabled)return toast('العجلة متوقفة');const bet=Number($('#wheelBet').value||0);if(bet<Number(set.minBet||1)||bet>Number(set.maxBet||500))return toast('قيمة الرهان خارج الحدود');if(Number(profile.realBalance)<bet)return toast('الرصيد غير كافي');const segs=set.segments||[];const total=segs.reduce((a,s)=>a+Number(s.w||0),0);let r=Math.random()*total, chosen=segs[0];for(const s of segs){r-=Number(s.w||0);if(r<=0){chosen=s;break}}const profit=bet*Number(chosen.m||0);const net=profit-bet;$('#wheel').style.transform='rotate('+(1440+Math.floor(Math.random()*360))+'deg)';await adjustBalance(currentUser.uid,net,0,0,'wheel_spin','نتيجة '+chosen.label);await db.ref('wheel_logs').push({uid:currentUser.uid,name:profile.name,bet,label:chosen.label,multiplier:chosen.m,profit,net,createdAt:now()});$('#wheelResult').textContent='النتيجة: '+chosen.label+' | الربح: '+money(profit)+'$';setTimeout(loadGameData,500)}
async function openLuckyBox(){const set=(await db.ref('global_system/lucky_box').once('value')).val()||{};if(!set.enabled)return toast('الصندوق متوقف');const cd=Number(set.cooldownHours||24)*3600000;if(now()-Number(profile.lastLuckyAt||0)<cd)return toast('انتظر حتى يكتمل 24 ساعة');const win=Math.random()*100<Number(set.winRate||35);let msg='للأسف لم تربح اليوم';let amount=0;if(win){amount=Number(set.min||.1)+Math.random()*(Number(set.max||1)-Number(set.min||.1));if(set.rewardType==='real')await adjustBalance(currentUser.uid,amount,0,0,'lucky_box','صندوق الحظ');else await adjustBalance(currentUser.uid,0,amount,0,'lucky_box','صندوق الحظ');msg='ربحت '+money(amount)+'$ '+(set.rewardType==='real'?'رصيد حقيقي':'بونص')}await db.ref('users/'+currentUser.uid+'/lastLuckyAt').set(now());$('#luckyResult').textContent=msg;toast(msg)}
function supportView(){return `<section class="grid g2"><div class="glass card"><h2>فتح تذكرة دعم</h2><label>العنوان</label><input id="supTitle" class="field"><label>الرسالة</label><textarea id="supMsg" class="field"></textarea><button class="btn" onclick="submitSupport()">إرسال</button></div><div class="glass card"><h2>وسائل التواصل</h2><p>WhatsApp / Telegram يتم تعديلها من الأدمن ضمن طرق الدفع والإعدادات.</p></div></section><section class="glass card" style="margin-top:14px"><h2>تذاكري</h2><div id="supportList"></div></section>`}
async function submitSupport(){await db.ref('support_tickets').push({uid:currentUser.uid,name:profile.name,email:profile.email,title:$('#supTitle').value,message:$('#supMsg').value,status:'open',createdAt:now(),reply:''});toast('تم إرسال التذكرة');loadSupportData()}
async function loadSupportData(){const t=(await db.ref('support_tickets').orderByChild('uid').equalTo(currentUser.uid).limitToLast(30).once('value')).val()||{};$('#supportList').innerHTML=table(Object.values(t).reverse(),['title','status','reply','createdAt'])}
function renderAdmin(){if(!isAdmin){adminMode=false;page='home';return render()}$('#view').innerHTML=`<section class="glass card"><h2>لوحة الأدمن</h2><div class="tabs"><span class="tab" onclick="adminTab='dash';loadAdminData()">الرئيسية</span><span class="tab" onclick="adminTab='users';loadAdminData()">المستخدمين</span><span class="tab" onclick="adminTab='finance';loadAdminData()">الإيداع والسحب</span><span class="tab" onclick="adminTab='payments';loadAdminData()">طرق الدفع</span><span class="tab" onclick="adminTab='draws';loadAdminData()">السحوبات</span><span class="tab" onclick="adminTab='wheel';loadAdminData()">العجلة</span><span class="tab" onclick="adminTab='support';loadAdminData()">الدعم</span><span class="tab" onclick="adminTab='settings';loadAdminData()">الإعدادات</span></div><div id="adminBox"></div></section>`;loadAdminData()}
let adminTab='dash';async function loadAdminData(){if(!$('#adminBox'))return;const box=$('#adminBox');if(adminTab==='dash'){const users=(await db.ref('users').once('value')).val()||{};const deps=(await db.ref('finance/deposits').once('value')).val()||{};const wds=(await db.ref('finance/withdrawals').once('value')).val()||{};let real=0,bonus=0,res=0;Object.values(users).forEach(u=>{real+=Number(u.realBalance||0);bonus+=Number(u.bonusBalance||0);res+=Number(u.reservedWithdrawalBalance||0)});box.innerHTML=`<div class="grid g4"><div class="glass stat"><p>المستخدمين</p><b>${Object.keys(users).length}</b></div><div class="glass stat"><p>الأرصدة</p><b>${money(real)}$</b></div><div class="glass stat"><p>البونص</p><b>${money(bonus)}$</b></div><div class="glass stat"><p>محجوز</p><b>${money(res)}$</b></div></div><div class="grid g2" style="margin-top:14px"><div class="glass card"><h3>إيداعات معلقة</h3><b>${Object.values(deps).filter(x=>x.status==='pending').length}</b></div><div class="glass card"><h3>سحوبات معلقة</h3><b>${Object.values(wds).filter(x=>x.status==='pending').length}</b></div></div>`}if(adminTab==='users'){const users=(await db.ref('users').once('value')).val()||{};box.innerHTML='<h3>المستخدمين</h3>'+Object.entries(users).map(([uid,u])=>`<div class="glass card" style="margin:10px 0"><b>${esc(u.name)}</b><p class="muted">${esc(u.email)} | ${uid}</p><div class="row"><span class="badge">Real ${money(u.realBalance)}</span><span class="badge">Bonus ${money(u.bonusBalance)}</span><span class="badge">Reserved ${money(u.reservedWithdrawalBalance)}</span><button class="btn small" onclick="adminAddBalance('${uid}')">تعديل الرصيد</button><button class="btn small secondary" onclick="adminToggleFreeze('${uid}',${!!u.isFrozen})">${u.isFrozen?'فك تجميد':'تجميد'}</button><button class="btn small secondary" onclick="adminVip('${uid}',${!!u.isVIP})">${u.isVIP?'إلغاء VIP':'VIP'}</button></div></div>`).join('')}if(adminTab==='finance'){const deps=(await db.ref('finance/deposits').once('value')).val()||{};const wds=(await db.ref('finance/withdrawals').once('value')).val()||{};box.innerHTML='<h3>طلبات الإيداع</h3>'+adminFinanceList(deps,'dep')+'<h3>طلبات السحب</h3>'+adminFinanceList(wds,'wd')}if(adminTab==='payments'){const pm=(await db.ref('payment_methods').once('value')).val()||{};box.innerHTML=`<h3>طرق الدفع</h3><div id="pmList">${Object.entries(pm).map(([id,m])=>`<div class="glass card" style="margin:10px 0"><div class="row"><b>${esc(m.name)}</b><span class="badge">${esc(m.type)}</span><span class="badge">${m.active?'مفعل':'متوقف'}</span></div><p class="muted">${esc(m.details)}</p><button class="btn small" onclick="editPayment('${id}')">تعديل</button></div>`).join('')}</div><div class="sep"></div><h3>إضافة طريقة</h3><input id="pmName" class="field" placeholder="الاسم"><input id="pmDetails" class="field" placeholder="التفاصيل"><input id="pmMin" class="field" type="number" value="1"><select id="pmType" class="field"><option value="deposit">إيداع</option><option value="withdraw">سحب</option><option value="both">الاثنين</option></select><button class="btn" onclick="addPayment()">حفظ</button>`}if(adminTab==='draws'){const ds=(await db.ref('draws/settings').once('value')).val()||{};const tickets=(await db.ref('tickets').once('value')).val()||{};box.innerHTML='<h3>إدارة السحوبات</h3>'+Object.entries(ds).map(([k,d])=>`<div class="glass card" style="margin:10px 0"><b>${esc(d.name)}</b><p>الجائزة: ${money(d.prize)} | الوقت: ${esc(d.time)} | ${d.active?'مفعل':'متوقف'}</p><button class="btn small" onclick="editDraw('${k}')">تعديل</button><button class="btn small green" onclick="runDraw('${k}')">تنفيذ السحب</button></div>`).join('')+'<h3>كل التذاكر</h3>'+table(Object.values(tickets).slice(-50).reverse(),['number','drawType','email','status','createdAt'])}if(adminTab==='wheel'){const wheel=(await db.ref('global_system/wheel').once('value')).val()||{};box.innerHTML=`<h3>إعدادات العجلة</h3><label>Min Bet</label><input id="wMin" class="field" type="number" value="${wheel.minBet||1}"><label>Max Bet</label><input id="wMax" class="field" type="number" value="${wheel.maxBet||500}"><label>Segments JSON</label><textarea id="wSeg" class="field" style="min-height:170px">${esc(JSON.stringify(wheel.segments||[],null,2))}</textarea><button class="btn" onclick="saveWheel()">حفظ العجلة</button>`}if(adminTab==='support'){const s=(await db.ref('support_tickets').once('value')).val()||{};box.innerHTML='<h3>تذاكر الدعم</h3>'+Object.entries(s).map(([id,t])=>`<div class="glass card" style="margin:10px 0"><b>${esc(t.title)}</b><p class="muted">${esc(t.email)} | ${esc(t.status)}</p><p>${esc(t.message)}</p><textarea id="reply_${id}" class="field" placeholder="رد الأدمن">${esc(t.reply||'')}</textarea><button class="btn small" onclick="replyTicket('${id}')">حفظ الرد</button><button class="btn small secondary" onclick="closeTicket('${id}')">إغلاق</button></div>`).join('')}if(adminTab==='settings'){const st=(await db.ref('global_system/settings').once('value')).val()||{};const splash=(await db.ref('public_config/splash').once('value')).val()||{};const terms=(await db.ref('legal/terms').once('value')).val()||'';box.innerHTML=`<h3>الإعدادات العامة</h3><label>بونص الإيداع %</label><input id="setDepBonus" class="field" type="number" value="${st.depositBonusPct||0}"><label>بونص التسجيل</label><input id="setSignup" class="field" type="number" value="${st.signupBonus||0}"><label>سعر التذكرة</label><input id="setTicket" class="field" type="number" value="${st.lotteryTicketPrice||1}"><h3>شاشة البداية</h3><input id="splashTitle" class="field" value="${esc(splash.title||'ADNOR')}"><input id="splashTextIn" class="field" value="${esc(splash.text||'')}"><h3>الشروط</h3><textarea id="termsText" class="field" style="min-height:120px">${esc(terms)}</textarea><button class="btn" onclick="saveSettings()">حفظ الإعدادات</button><div class="dangerNote" style="margin-top:12px">تنبيه: تنبيه Gmail يحتاج Firebase Extension / SMTP ولا يوضع داخل كود الموقع.</div>`}}
function adminFinanceList(obj,type){return Object.entries(obj).reverse().map(([id,x])=>`<div class="glass card" style="margin:10px 0"><div class="row"><b>${esc(x.name||x.email)}</b><span class="badge">${money(x.amount)}$</span><span class="status ${x.status}">${esc(x.status)}</span></div><p class="muted">${esc(x.method)} | ${new Date(x.createdAt||0).toLocaleString()}</p>${x.receiptUrl?`<a class="btn small secondary" target="_blank" href="${esc(x.receiptUrl)}">فتح الإيصال</a>`:''}<div class="row"><button class="btn small green" onclick="${type==='dep'?'approveDeposit':'approveWithdrawal'}('${id}')">قبول</button><button class="btn small red" onclick="${type==='dep'?'rejectDeposit':'rejectWithdrawal'}('${id}')">رفض</button></div></div>`).join('')||'<p class="muted">لا يوجد</p>'}
async function adminAddBalance(uid){const r=Number(prompt('كم رصيد حقيقي؟ يمكن سالب',0)||0);const b=Number(prompt('كم بونص؟ يمكن سالب',0)||0);await adjustBalance(uid,r,b,0,'admin_adjust','تعديل أدمن');toast('تم التعديل');loadAdminData()}async function adminToggleFreeze(uid,v){await db.ref('users/'+uid+'/isFrozen').set(!v);loadAdminData()}async function adminVip(uid,v){await db.ref('users/'+uid+'/isVIP').set(!v);loadAdminData()}
async function approveDeposit(id){const ref=db.ref('finance/deposits/'+id);const d=(await ref.once('value')).val();if(!d||d.status!=='pending')return toast('الطلب غير صالح');const st=(await db.ref('global_system/settings').once('value')).val()||{};const bonus=Number(d.amount||0)*Number(st.depositBonusPct||0)/100;await adjustBalance(d.uid,Number(d.amount),bonus,0,'deposit_approved','قبول إيداع '+id);await ref.update({status:'approved',approvedAt:now(),approvedBy:currentUser.email,bonus});toast('تم قبول الإيداع');loadAdminData()}async function rejectDeposit(id){const reason=prompt('سبب الرفض')||'مرفوض';await db.ref('finance/deposits/'+id).update({status:'rejected',rejectedAt:now(),rejectedBy:currentUser.email,reason});loadAdminData()}
async function approveWithdrawal(id){const ref=db.ref('finance/withdrawals/'+id);const w=(await ref.once('value')).val();if(!w||w.status!=='pending')return;await adjustBalance(w.uid,0,0,-Number(w.amount),'withdraw_approved','قبول سحب '+id);await ref.update({status:'approved',approvedAt:now(),approvedBy:currentUser.email});toast('تم قبول السحب');loadAdminData()}async function rejectWithdrawal(id){const reason=prompt('سبب الرفض')||'مرفوض';const ref=db.ref('finance/withdrawals/'+id);const w=(await ref.once('value')).val();if(!w||w.status!=='pending')return;await adjustBalance(w.uid,Number(w.amount),0,-Number(w.amount),'withdraw_rejected','رفض سحب '+id);await ref.update({status:'rejected',rejectedAt:now(),rejectedBy:currentUser.email,reason});loadAdminData()}
async function addPayment(){const id='pm_'+Date.now();await db.ref('payment_methods/'+id).set({name:$('#pmName').value,type:$('#pmType').value,minDeposit:Number($('#pmMin').value||1),details:$('#pmDetails').value,active:true});loadAdminData()}async function editPayment(id){const s=(await db.ref('payment_methods/'+id).once('value')).val()||{};const name=prompt('الاسم',s.name)||s.name;const details=prompt('التفاصيل',s.details)||s.details;const active=confirm('OK = مفعّل / Cancel = متوقف');await db.ref('payment_methods/'+id).update({name,details,active});loadAdminData()}
async function editDraw(k){const ref=db.ref('draws/settings/'+k);const d=(await ref.once('value')).val()||{};const prize=Number(prompt('قيمة الجائزة',d.prize)||d.prize);const time=prompt('الوقت',d.time)||d.time;await ref.update({prize,time});loadAdminData()}async function runDraw(k){const ds=(await db.ref('draws/settings/'+k).once('value')).val()||{};const t=(await db.ref('tickets').orderByChild('drawType').equalTo(k).once('value')).val()||{};const arr=Object.entries(t).filter(([id,x])=>x.status==='active');if(!arr.length)return toast('لا يوجد تذاكر');const [ticketId,ticket]=arr[Math.floor(Math.random()*arr.length)];await db.ref('tickets/'+ticketId).update({status:'won',won:true,wonAt:now()});await adjustBalance(ticket.uid,Number(ds.prize||0),0,0,'draw_win','فوز '+ds.name);await db.ref('draw_history').push({drawType:k,prize:ds.prize,winnerUid:ticket.uid,winnerEmail:ticket.email,ticketNumber:ticket.number,createdAt:now(),ticketId});for(const [id,x] of arr){if(id!==ticketId){if(ds.next){await db.ref('tickets/'+id).update({drawType:ds.next,status:'moved_'+ds.next,movedAt:now()})}else await db.ref('tickets/'+id).update({status:'lost',lostAt:now()})}}toast('تم تنفيذ السحب والفائز '+ticket.email);loadAdminData()}
async function saveWheel(){try{const seg=JSON.parse($('#wSeg').value);await db.ref('global_system/wheel').update({minBet:Number($('#wMin').value),maxBet:Number($('#wMax').value),segments:seg});toast('تم حفظ العجلة')}catch(e){toast('JSON غير صحيح')}}async function replyTicket(id){await db.ref('support_tickets/'+id).update({reply:$('#reply_'+id).value,status:'answered',answeredAt:now(),answeredBy:currentUser.email});loadAdminData()}async function closeTicket(id){await db.ref('support_tickets/'+id).update({status:'closed'});loadAdminData()}async function saveSettings(){await db.ref('global_system/settings').update({depositBonusPct:Number($('#setDepBonus').value||0),signupBonus:Number($('#setSignup').value||0),lotteryTicketPrice:Number($('#setTicket').value||1)});await db.ref('public_config/splash').update({title:$('#splashTitle').value,text:$('#splashTextIn').value});await db.ref('legal/terms').set($('#termsText').value);toast('تم حفظ الإعدادات')}
function table(rows,cols){if(!rows||!rows.length)return '<p class="muted">لا يوجد بيانات</p>';return `<table class="table"><thead><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${cols.map(c=>`<td>${c.includes('At')&&r[c]?new Date(r[c]).toLocaleString():esc(r[c]??'')}</td>`).join('')}</tr>`).join('')}</tbody></table>`}
</script>
</body></html>
