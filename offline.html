<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#071224"><title>ADNOR | غير متصل</title><style>*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at 50% 0,#173c67,#071426 38%,#020711);font-family:Arial,sans-serif;color:#fff}.card{width:min(460px,100%);text-align:center;padding:32px 24px;border-radius:30px;border:1px solid rgba(255,219,120,.45);background:linear-gradient(180deg,rgba(9,28,54,.96),rgba(2,9,20,.98));box-shadow:0 28px 80px rgba(0,0,0,.55)}.logo{width:86px;height:86px;margin:auto;border-radius:28px;display:grid;place-items:center;font-size:46px;color:#171004;background:linear-gradient(#fff3b5,#d7a42b 62%,#88550d);box-shadow:0 0 34px rgba(229,180,47,.3)}h1{color:#ffe49a;margin:20px 0 8px}p{color:#b9c5d8;line-height:1.9}.btn{width:100%;height:52px;border:0;border-radius:17px;font-weight:900;cursor:pointer;background:linear-gradient(#fff0a8,#d5a129);color:#171004}</style></head><body><main class="card"><div class="logo">♛</div><h1>الاتصال غير متوفر</h1><p>تحتاج العمليات الحقيقية مثل الرصيد، شراء التذاكر، الألعاب والشحن إلى اتصال بالإنترنت. تحقق من الشبكة ثم أعد المحاولة.</p><button class="btn" onclick="location.reload()">إعادة المحاولة</button></main></body></html>
