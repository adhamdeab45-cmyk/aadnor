<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ADNOR | تفعيل أول أدمن</title><link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@900&family=IBM+Plex+Sans+Arabic:wght@400;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="assets/css/main.css"><style>.boot{min-height:100vh;display:grid;place-items:center;padding:20px}.boot article{width:min(100%,460px);padding:28px;border-radius:28px;background:linear-gradient(180deg,#0d223d,#06111f);border:1px solid rgba(255,211,104,.35)}.boot h1{margin:20px 0 5px}.boot p{color:#aeb9c8;line-height:1.8}.boot input{width:100%;height:52px;border-radius:15px;border:1px solid rgba(255,211,104,.3);background:#071426;color:#fff;padding:0 12px;margin:10px 0}.boot .btn{margin-top:8px}</style></head><body><main class="boot"><article><div class="brand"><span>♛</span><b>ADNOR</b></div><h1>تفعيل أول أدمن</h1><p>استخدم هذه الصفحة مرة واحدة بعد نشر الدوال وضبط السر <code>ADMIN_BOOTSTRAP_KEY</code>. بعد النجاح سجّل الخروج ثم ادخل من لوحة الأدمن.</p><button id="login" class="btn glass full">1. دخول Google</button><input id="key" type="password" placeholder="Bootstrap secret"><button id="activate" class="btn gold full">2. تفعيل حسابي كأدمن</button><a href="admin.html" class="btn glass full">فتح لوحة الأدمن</a><div id="status" class="form-status"></div></article></main><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-functions-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-storage-compat.js"></script><script src="assets/js/firebase-config.js"></script><script>const status=document.getElementById('status');document.getElementById('login').onclick=()=>ADNOR.auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).then(u=>{status.textContent='تم الدخول: '+u.user.email;status.className='form-status ok'}).catch(e=>{status.textContent=e.message;status.className='form-status bad'});document.getElementById('activate').onclick=async()=>{if(!ADNOR.auth.currentUser){status.textContent='سجّل دخول Google أولاً';return}try{status.textContent='جاري التفعيل...';await ADNOR.functions.httpsCallable('bootstrapAdmin')({key:document.getElementById('key').value});await ADNOR.auth.currentUser.getIdToken(true);status.textContent='تم التفعيل. سجّل الخروج ثم ادخل من admin.html';status.className='form-status ok'}catch(e){status.textContent=e.message;status.className='form-status bad'}};</script></body></html>
